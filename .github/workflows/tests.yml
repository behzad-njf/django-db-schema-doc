name: Tests

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Build ERD frontend
        working-directory: db_schema_doc/frontend
        run: |
          npm install
          npm run build

      - name: Run pytest
        run: pytest
